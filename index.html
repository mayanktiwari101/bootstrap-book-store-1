<!doctype html>
<html lang="em">

<head>
    <meta charset="utf=8">
    <meta name="viewport" content="width=device-widht, intial-scale-1, shrink-to-fit=no">
    <link rel="icon" href="img/title-img.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/lightbox.css">
    <title>Book Store</title>
</head>
<body>
    <!-- header -->
    <header class="d-flex align-items-center">
        <div class="align-self-start position-absolute">
            <a href="#">
                <img src="img/bookimg1.png" width="120" class="img-fluid m-4">
            </a>
        </div>
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <h1 class="text-light display-1 font-italic mb-5 banner-heading">We
                        <img src="img/bookimg2.png" width="250" class="img-fluid">
                        Reading
                    </h1>
                    <a href="#" class="btn btn-lg btn-outline-danger text-uppercase px-5">Check Out</a>
                </div>
            </div>
        </div>
    </header>
    <!-- end-of-header -->
    <!-- gallery -->
    <section class="gallery">
        <div class="container">
            <!-- title -->
            <div class="row">
                <div class="col text-center py-5">
                    <h1 class="text-secondary text-uppercase font-italic common-title">
                        The best libraries in the world
                    </h1>
                </div>
            </div>
            <!-- end-of-title -->
            <div class="row mb-4 first-row align-items-end">
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/library1.jpg" data-lightbox="library" data-title="Kolkata library, Salt Lake">
                        <img src="img/library/library1.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/library2.jpg" data-lightbox="library" data-title="Compika library, Digha Gaon">
                        <img src="img/library/library2.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/library3.jpg" data-lightbox="library" data-title="Kopar Kharane library, New Mexico">
                        <img src="img/library/library3.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/lilrary4.jpg" data-lightbox="library" data-title="Lawn Make library, Kolaghat">
                        <img src="img/library/lilrary4.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
            </div>
            <div class="row mb-4 second-row align-items-end">
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/library5.jpg" data-lightbox="library" data-title="Hudwa library, Merru Ghat">
                        <img src="img/library/library5.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library/library6.jpg" data-lightbox="library" data-title="Pathuriya library, New Olla">
                        <img src="img/library/library6.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library//library7.jpg" data-lightbox="library" data-title="Ulla library, Pulla Kulla">
                        <img src="img/library/library7.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
                <div class="col-lg-3 col-sm-6 col-10 mx-auto">
                    <a href="img/library//library8.jpg" data-lightbox="library" data-title="Sua Mu library, Hilla Hua">
                        <img src="img/library/library8.jpg" class="img-thumbnail gallery-img">
                    </a>
                </div>
            </div>
        </div>
    </section>
    <!-- end-of-gallery -->
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/popper.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/script.js"></script>
    <script src="js/lightbox.js"></script>
</body>
</html>
